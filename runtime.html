<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>External Send Alert</title>

    <!-- Microsoft Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- ALL add-in logic is inline to eliminate caching issues with external JS files -->
    <script type="text/javascript">
    /*
     * External Send Alert — Inline Runtime
     * v5.0 — All JS embedded directly in HTML to bypass OWA caching.
     */

    // ========================================================================
    // CONFIGURATION
    // ========================================================================
    var INTERNAL_DOMAINS = [
        "metrixlab.com",
        "toluna.com"
    ];

    // ========================================================================
    // HELPER: Check if domain is internal (supports subdomains)
    // ========================================================================
    function isInternalDomain(domain) {
        for (var i = 0; i < INTERNAL_DOMAINS.length; i++) {
            var d = INTERNAL_DOMAINS[i];
            if (domain === d || (domain.length > d.length && domain.indexOf("." + d) === domain.length - d.length - 1)) {
                return true;
            }
        }
        return false;
    }

    // ========================================================================
    // HELPER: Extract external recipients
    // ========================================================================
    function getExternalRecipients(allRecipients) {
        var externals = [];
        for (var i = 0; i < allRecipients.length; i++) {
            var email = allRecipients[i].emailAddress || "";
            if (!email || email.indexOf("@") === -1) continue;
            var domain = email.substring(email.indexOf("@") + 1).toLowerCase();
            if (!isInternalDomain(domain)) {
                externals.push(email);
            }
        }
        return externals;
    }

    // ========================================================================
    // HELPER: Fetch one recipient field with safety timeout
    // ========================================================================
    function getRecipientField(field) {
        return new Promise(function (resolve) {
            var done = false;
            var timer = setTimeout(function () { done = true; resolve([]); }, 3000);
            try {
                field.getAsync(function (r) {
                    if (done) return;
                    clearTimeout(timer);
                    resolve(r.value || []);
                });
            } catch (e) {
                if (!done) { clearTimeout(timer); resolve([]); }
            }
        });
    }

    // ========================================================================
    // HELPER: Fetch all recipients (To + Cc + Bcc)
    // ========================================================================
    function getAllRecipients(item) {
        return Promise.all([
            getRecipientField(item.to),
            getRecipientField(item.cc),
            getRecipientField(item.bcc)
        ]).then(function (r) {
            return r[0].concat(r[1], r[2]);
        });
    }

    // ========================================================================
    // HELPER: Safely get attachment count
    // ========================================================================
    function getAttachmentCount(item) {
        return new Promise(function (resolve) {
            try {
                if (typeof item.getAttachmentsAsync !== "function") { resolve(0); return; }
                var done = false;
                var timer = setTimeout(function () { done = true; resolve(0); }, 2000);
                item.getAttachmentsAsync(function (r) {
                    if (done) return;
                    clearTimeout(timer);
                    var att = r.value || [], count = 0;
                    for (var j = 0; j < att.length; j++) { if (!att[j].isInline) count++; }
                    resolve(count);
                });
            } catch (e) { resolve(0); }
        });
    }

    // ========================================================================
    // Format external list for display
    // ========================================================================
    function formatExternalList(externals) {
        return externals.length <= 3
            ? externals.join(", ")
            : externals.slice(0, 3).join(", ") + " (+" + (externals.length - 3) + " more)";
    }

    // ========================================================================
    // EVENT: OnRecipientsChanged — Yellow info banner (non-intrusive)
    // ========================================================================
    function onRecipientsChangedHandler(event) {
        var completed = false;
        var finish = function () { if (!completed) { completed = true; event.completed(); } };
        setTimeout(finish, 4000);

        try {
            var item = Office.context.mailbox.item;
            getAllRecipients(item).then(function (allRecipients) {
                var externals = getExternalRecipients(allRecipients);
                if (externals.length > 0) {
                    item.notificationMessages.replaceAsync("externalWarning", {
                        type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
                        message: "\u26A0 External recipients detected: " + formatExternalList(externals),
                        icon: "Icon.16x16",
                        persistent: true
                    });
                } else {
                    item.notificationMessages.removeAsync("externalWarning");
                }
                finish();
            }).catch(finish);
        } catch (e) { finish(); }
    }

    // ========================================================================
    // EVENT: OnMessageSend — Block only for external recipients
    // Internal-only emails pass through with ZERO delay.
    // ========================================================================
    function onMessageSendHandler(event) {
        var completed = false;
        var finish = function (opts) {
            if (!completed) {
                completed = true;
                event.completed(opts || { allowEvent: true });
            }
        };
        // Master timeout: fail-open after 4 seconds
        setTimeout(function () { finish({ allowEvent: true }); }, 4000);

        try {
            var item = Office.context.mailbox.item;
            var recipientsPromise = getAllRecipients(item);
            var attachmentCountPromise = getAttachmentCount(item);

            Promise.all([recipientsPromise, attachmentCountPromise]).then(function (results) {
                var allRecipients = results[0];
                var realAttachmentCount = results[1];
                var externals = getExternalRecipients(allRecipients);

                // Internal only — allow immediately
                if (externals.length === 0) {
                    finish({ allowEvent: true });
                    return;
                }

                // External recipients — build alert and block
                var msg = "EXTERNAL SEND ALERT\n\n"
                    + "External recipient(s): " + formatExternalList(externals) + "\n\n";

                if (realAttachmentCount > 0) {
                    msg += "Attachments: " + realAttachmentCount + " file(s) included.\n\n";
                }

                msg += "Verify you are authorized to send outside the organization.";

                if (msg.length > 240) { msg = msg.substring(0, 237) + "..."; }

                finish({ allowEvent: false, errorMessage: msg });

            }).catch(function () { finish({ allowEvent: true }); });
        } catch (e) { finish({ allowEvent: true }); }
    }

    // ========================================================================
    // RIBBON BUTTON: Manual check
    // ========================================================================
    function onButtonClickHandler(event) {
        var completed = false;
        var finish = function () { if (!completed) { completed = true; event.completed(); } };
        setTimeout(finish, 4000);

        try {
            var item = Office.context.mailbox.item;
            getAllRecipients(item).then(function (allRecipients) {
                var externals = getExternalRecipients(allRecipients);
                if (externals.length > 0) {
                    item.notificationMessages.replaceAsync("externalWarning", {
                        type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
                        message: "\u26A0 External recipients: " + formatExternalList(externals),
                        icon: "Icon.16x16",
                        persistent: false
                    });
                } else {
                    item.notificationMessages.replaceAsync("externalClear", {
                        type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
                        message: "\u2705 All recipients are internal.",
                        icon: "Icon.16x16",
                        persistent: false
                    });
                }
                finish();
            }).catch(finish);
        } catch (e) { finish(); }
    }

    // ========================================================================
    // REGISTER HANDLERS — Must be at top level
    // ========================================================================
    Office.actions.associate("onMessageSendHandler", onMessageSendHandler);
    Office.actions.associate("onButtonClickHandler", onButtonClickHandler);
    Office.actions.associate("onRecipientsChangedHandler", onRecipientsChangedHandler);
    </script>
</head>
<body>
</body>
</html>
